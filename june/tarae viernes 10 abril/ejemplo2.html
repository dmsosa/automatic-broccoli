    {

    .container {

        border: solid 0.25rem magenta;
        padding: 0.25rem 1rem;
        transition: all 0.4s ease;

    .container:hover {

        cursor: pointer;
    }
    button {
    padding: 10px;
    border: none;
    background-color: navajowhite;
    color: darkslategrey;
    transition: all 0.4s ease;
    }
    button:hover {
        box-shadow: 0 5px 5px 5px black;
        cursor: pointer;
        color: brown;
        background-color: burlywood;
    }
</style>
