<!DOCTYPE html>
<html>
<head>
<title>Botón con estilos</title>
<style>
    button {
    padding: 10px;
    border: none;
    background-color: navajowhite;
    color: darkslategrey;
    transition: all 0.4s ease;
    }
    button:hover {
        box-shadow: 0 5px 5px 5px black;
        cursor: pointer;
        color: brown;
        background-color: burlywood;
    }
</style>
</head>
<body>
<button>Haz clic</button>
</body>
</html>
